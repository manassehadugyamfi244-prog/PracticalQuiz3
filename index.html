<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Solar System</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
  canvas { display: block; }
  #ui {
    position: fixed;
    top: 20px;
    left: 20px;
    color: rgba(255,255,255,0.7);
    font-size: 12px;
    letter-spacing: 1px;
    text-transform: uppercase;
    pointer-events: none;
  }
  #ui h1 { font-size: 18px; color: #fff; margin-bottom: 4px; letter-spacing: 4px; }
  #ui p { font-size: 10px; color: rgba(255,255,255,0.4); margin-bottom: 12px; }
  .planet-info { display: flex; align-items: center; gap: 8px; margin: 3px 0; }
  .dot { width: 6px; height: 6px; border-radius: 50%; }
  #controls {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.4);
    font-size: 10px;
    letter-spacing: 2px;
    text-align: center;
  }
  #speed-control {
    position: fixed;
    top: 20px;
    right: 20px;
    color: rgba(255,255,255,0.7);
    font-size: 11px;
    letter-spacing: 1px;
  }
  #speed-control label { display: block; margin-bottom: 8px; text-transform: uppercase; }
  #speed-slider {
    -webkit-appearance: none;
    width: 120px;
    height: 2px;
    background: rgba(255,255,255,0.2);
    outline: none;
    cursor: pointer;
  }
  #speed-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: #fff;
    cursor: pointer;
  }
</style>
</head>
<body>
<div id="ui">
  <h1>SOLAR SYSTEM</h1>
  <p>Our corner of the cosmos</p>
  <div class="planet-info"><div class="dot" style="background:#FDB813"></div>Sun</div>
  <div class="planet-info"><div class="dot" style="background:#b5b5b5"></div>Mercury</div>
  <div class="planet-info"><div class="dot" style="background:#e8cda0"></div>Venus</div>
  <div class="planet-info"><div class="dot" style="background:#4f9de0"></div>Earth</div>
  <div class="planet-info"><div class="dot" style="background:#c1440e"></div>Mars</div>
  <div class="planet-info"><div class="dot" style="background:#c88b3a"></div>Jupiter</div>
  <div class="planet-info"><div class="dot" style="background:#e8d5a3"></div>Saturn</div>
  <div class="planet-info"><div class="dot" style="background:#7de8e8"></div>Uranus</div>
  <div class="planet-info"><div class="dot" style="background:#3f54ba"></div>Neptune</div>
</div>
<div id="speed-control">
  <label>Speed</label>
  <input type="range" id="speed-slider" min="0.1" max="5" step="0.1" value="1">
</div>
<div id="controls">DRAG TO ROTATE &nbsp;·&nbsp; SCROLL TO ZOOM</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 2000);
camera.position.set(0, 80, 200);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = true;
document.body.appendChild(renderer.domElement);

const loader = new THREE.TextureLoader();

// Starfield background
const starsGeo = new THREE.SphereGeometry(900, 64, 64);
const starsTex = loader.load('2k_stars_milky_way.jpg');
const starsMat = new THREE.MeshBasicMaterial({ map: starsTex, side: THREE.BackSide });
scene.add(new THREE.Mesh(starsGeo, starsMat));

// Lighting
const ambientLight = new THREE.AmbientLight(0x111111);
scene.add(ambientLight);
const sunLight = new THREE.PointLight(0xffffff, 2, 600);
scene.add(sunLight);

// Sun
const sunGeo = new THREE.SphereGeometry(12, 64, 64);
const sunTex = loader.load('2k_sun.jpg');
const sunMat = new THREE.MeshBasicMaterial({ map: sunTex });
const sun = new THREE.Mesh(sunGeo, sunMat);
scene.add(sun);

// Sun glow
const glowGeo = new THREE.SphereGeometry(13.5, 32, 32);
const glowMat = new THREE.MeshBasicMaterial({
  color: 0xFDB813, transparent: true, opacity: 0.15, side: THREE.FrontSide
});
scene.add(new THREE.Mesh(glowGeo, glowMat));

// Planet data: [name, texture, radius, orbitRadius, orbitSpeed, selfRotSpeed, color]
const planetData = [
  { name: 'Mercury', tex: '2k_mercury.jpg',    r: 1.5,  orbit: 25,  speed: 4.74,  rot: 0.01, color: '#b5b5b5' },
  { name: 'Venus',   tex: '2k_venus_atmosphere.jpg', r: 2.2,  orbit: 36,  speed: 3.50,  rot: 0.005, color: '#e8cda0' },
  { name: 'Earth',   tex: '2k_earth_daymap.jpg', r: 2.4,  orbit: 50,  speed: 2.98,  rot: 0.02,  color: '#4f9de0' },
  { name: 'Mars',    tex: '2k_mars.jpg',        r: 1.8,  orbit: 65,  speed: 2.41,  rot: 0.018, color: '#c1440e' },
  { name: 'Jupiter', tex: '2k_jupiter.jpg',     r: 6.5,  orbit: 95,  speed: 1.31,  rot: 0.04,  color: '#c88b3a' },
  { name: 'Saturn',  tex: '2k_saturn.jpg',      r: 5.5,  orbit: 128, speed: 0.97,  rot: 0.038, color: '#e8d5a3', hasRing: true },
  { name: 'Uranus',  tex: '2k_uranus.jpg',      r: 3.8,  orbit: 158, speed: 0.68,  rot: 0.03,  color: '#7de8e8' },
  { name: 'Neptune', tex: '2k_neptune.jpg',     r: 3.5,  orbit: 185, speed: 0.54,  rot: 0.028, color: '#3f54ba' },
];

const planets = [];
const orbitAngles = planetData.map((_, i) => (i * Math.PI * 2) / planetData.length);

// Create orbit rings
planetData.forEach(p => {
  const orbitGeo = new THREE.RingGeometry(p.orbit - 0.1, p.orbit + 0.1, 128);
  const orbitMat = new THREE.MeshBasicMaterial({
    color: 0xffffff, side: THREE.DoubleSide, transparent: true, opacity: 0.08
  });
  const ring = new THREE.Mesh(orbitGeo, orbitMat);
  ring.rotation.x = Math.PI / 2;
  scene.add(ring);
});

// Create planets
planetData.forEach((p, i) => {
  const geo = new THREE.SphereGeometry(p.r, 64, 64);
  const tex = loader.load(p.tex);
  const mat = new THREE.MeshPhongMaterial({ map: tex, shininess: 5 });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.castShadow = true;
  mesh.receiveShadow = true;

  const pivot = new THREE.Object3D();
  pivot.add(mesh);
  scene.add(pivot);

  // Place planet at initial orbit position
  const angle = orbitAngles[i];
  mesh.position.set(Math.cos(angle) * p.orbit, 0, Math.sin(angle) * p.orbit);

  // Saturn's ring
  if (p.hasRing) {
    const ringTex = loader.load('2k_saturn_ring_alpha.png');
    const ringGeo = new THREE.RingGeometry(p.r * 1.4, p.r * 2.4, 128);
    // Fix UV mapping for ring
    const pos = ringGeo.attributes.position;
    const uv = ringGeo.attributes.uv;
    for (let j = 0; j < pos.count; j++) {
      const x = pos.getX(j), y = pos.getY(j);
      const dist = Math.sqrt(x*x + y*y);
      const minR = p.r * 1.4, maxR = p.r * 2.4;
      uv.setXY(j, (dist - minR) / (maxR - minR), 0.5);
    }
    const ringMat = new THREE.MeshBasicMaterial({
      map: ringTex, side: THREE.DoubleSide, transparent: true, opacity: 0.85
    });
    const ringMesh = new THREE.Mesh(ringGeo, ringMat);
    ringMesh.rotation.x = Math.PI / 2.5;
    mesh.add(ringMesh);
  }

  planets.push({ mesh, pivot, data: p, angle: orbitAngles[i] });
});

// Moon for Earth
const moonGeo = new THREE.SphereGeometry(0.6, 32, 32);
const moonTex = loader.load('2k_moon.jpg');
const moonMat = new THREE.MeshPhongMaterial({ map: moonTex, shininess: 2 });
const moon = new THREE.Mesh(moonGeo, moonMat);
planets[2].mesh.add(moon); // Earth index = 2
moon.position.set(4, 0, 0);
let moonAngle = 0;

// Mouse orbit controls (manual)
let isDragging = false;
let prevMouse = { x: 0, y: 0 };
let spherical = { theta: 0, phi: Math.PI / 4, radius: 220 };

renderer.domElement.addEventListener('mousedown', e => {
  isDragging = true;
  prevMouse = { x: e.clientX, y: e.clientY };
});
renderer.domElement.addEventListener('mousemove', e => {
  if (!isDragging) return;
  const dx = e.clientX - prevMouse.x;
  const dy = e.clientY - prevMouse.y;
  spherical.theta -= dx * 0.005;
  spherical.phi = Math.max(0.1, Math.min(Math.PI - 0.1, spherical.phi + dy * 0.005));
  prevMouse = { x: e.clientX, y: e.clientY };
});
renderer.domElement.addEventListener('mouseup', () => isDragging = false);
renderer.domElement.addEventListener('wheel', e => {
  spherical.radius = Math.max(50, Math.min(600, spherical.radius + e.deltaY * 0.3));
});

// Touch support
renderer.domElement.addEventListener('touchstart', e => {
  isDragging = true;
  prevMouse = { x: e.touches[0].clientX, y: e.touches[0].clientY };
});
renderer.domElement.addEventListener('touchmove', e => {
  if (!isDragging) return;
  const dx = e.touches[0].clientX - prevMouse.x;
  const dy = e.touches[0].clientY - prevMouse.y;
  spherical.theta -= dx * 0.005;
  spherical.phi = Math.max(0.1, Math.min(Math.PI - 0.1, spherical.phi + dy * 0.005));
  prevMouse = { x: e.touches[0].clientX, y: e.touches[0].clientY };
});
renderer.domElement.addEventListener('touchend', () => isDragging = false);

let speedMultiplier = 1;
document.getElementById('speed-slider').addEventListener('input', e => {
  speedMultiplier = parseFloat(e.target.value);
});

const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const delta = clock.getDelta() * speedMultiplier;

  // Rotate sun
  sun.rotation.y += delta * 0.1;

  // Orbit planets
  planets.forEach(p => {
    p.angle += delta * (p.data.speed / 50);
    p.mesh.position.set(
      Math.cos(p.angle) * p.data.orbit,
      0,
      Math.sin(p.angle) * p.data.orbit
    );
    p.mesh.rotation.y += delta * p.data.rot * 10;
  });

  // Moon orbit
  moonAngle += delta * 2;
  moon.position.set(Math.cos(moonAngle) * 4, 0, Math.sin(moonAngle) * 4);

  // Camera update
  camera.position.set(
    spherical.radius * Math.sin(spherical.phi) * Math.sin(spherical.theta),
    spherical.radius * Math.cos(spherical.phi),
    spherical.radius * Math.sin(spherical.phi) * Math.cos(spherical.theta)
  );
  camera.lookAt(0, 0, 0);

  renderer.render(scene, camera);
}

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

animate();
</script>
</body>
</html>
